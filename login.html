<!DOCTYPE html>
<html lang="en">
<head>
<script src="/api/config"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<title>Sign in · Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
/* Same look as the old lock.js gate, so the swap feels seamless. */
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0; min-height: 100vh;
  background: #050506; color: #B8B6B0;
  font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
}
body {
  display: flex; align-items: center; justify-content: center;
  padding: 24px; position: relative; overflow: hidden;
}
body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none;
  background:
    radial-gradient(circle at 82% 14%, rgba(224,118,88,0.16), transparent 45%),
    radial-gradient(circle at 18% 90%, rgba(180,180,200,0.06), transparent 50%);
  filter: blur(40px);
}
.login-card {
  position: relative; width: 100%; max-width: 340px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 18px; padding: 28px 24px;
  box-shadow: 0 24px 70px rgba(0,0,0,0.6);
  backdrop-filter: blur(24px) saturate(1.2);
  -webkit-backdrop-filter: blur(24px) saturate(1.2);
  text-align: center;
}
.login-icon { font-size: 34px; line-height: 1; margin-bottom: 12px; }
.login-title {
  margin: 0 0 4px; font-size: 19px; font-weight: 700; letter-spacing: -0.02em;
  color: #FAFAFA;
}
.login-sub { margin: 0 0 20px; font-size: 12.5px; color: #76746E; }
.login-input {
  width: 100%; padding: 12px 14px; margin-bottom: 12px;
  border: 1px solid rgba(255,255,255,0.10); border-radius: 12px;
  background: rgba(0,0,0,0.30); color: #FAFAFA;
  font-family: inherit; font-size: 15px; outline: none; text-align: center;
  color-scheme: dark; transition: border-color 0.2s, background 0.2s;
}
.login-input:focus { border-color: rgba(255,255,255,0.30); background: rgba(0,0,0,0.40); }
.login-input.err { border-color: #FF6B6B; animation: login-shake 0.32s; }
@keyframes login-shake {
  0%,100%{transform:translateX(0)} 20%{transform:translateX(-7px)}
  40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(3px)}
}
.login-btn {
  width: 100%; padding: 12px 16px; border: 0; border-radius: 12px; cursor: pointer;
  background: linear-gradient(180deg, #FFFFFF 0%, #E8E5DD 100%); color: #0A0A0B;
  font-family: inherit; font-size: 14px; font-weight: 700;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), 0 2px 8px rgba(0,0,0,0.35);
  transition: filter 0.15s, transform 0.1s, opacity 0.15s;
}
.login-btn:hover { filter: brightness(1.05); }
.login-btn:active { transform: translateY(1px); }
.login-btn:disabled { opacity: 0.55; cursor: default; }
.login-msg { min-height: 16px; margin-top: 10px; font-size: 12px; color: #FF6B6B; }
</style>
</head>
<body>

<form class="login-card" id="loginForm" novalidate>
  <div class="login-icon">🔒</div>
  <h1 class="login-title">Dashboard</h1>
  <p class="login-sub">Sign in to continue.</p>
  <input class="login-input" id="loginEmail" type="email" placeholder="Email"
         autocomplete="username" autocapitalize="off" autocorrect="off"
         spellcheck="false" aria-label="Email">
  <input class="login-input" id="loginPassword" type="password" placeholder="Password"
         autocomplete="current-password" aria-label="Password">
  <button class="login-btn" id="loginBtn" type="submit">Sign in</button>
  <div class="login-msg" id="loginMsg" role="alert"></div>
</form>

<script>
(function () {
  'use strict';

  // Same config source + fallbacks as auth.js / sync.js.
  var SUPABASE_URL = (window.DASH_SUPABASE_URL) || 'https://awytpwgorebhjewlqlhs.supabase.co';
  var SUPABASE_KEY = (window.DASH_SUPABASE_KEY) || 'sb_publishable_iyTy90Bi9Ct9ZMY0nu9hjA_N5BFmlFN';

  var form = document.getElementById('loginForm');
  var emailEl = document.getElementById('loginEmail');
  var passEl = document.getElementById('loginPassword');
  var btn = document.getElementById('loginBtn');
  var msg = document.getElementById('loginMsg');

  // Where to go after signing in. Only same-directory dashboard pages are
  // allowed (no absolute URLs / protocols / paths), so ?next= can't be
  // abused as an open redirect.
  function nextPage() {
    var m = /[?&]next=([^&]+)/.exec(window.location.search);
    var next = m ? decodeURIComponent(m[1]) : '';
    if (/^[\w.-]+\.html([?#].*)?$/.test(next) && next.indexOf('login.html') !== 0) return next;
    return 'index.html';
  }

  if (!window.supabase || !window.supabase.createClient) {
    msg.textContent = 'Could not load the sign-in library — check your connection and reload.';
    btn.disabled = true;
    return;
  }

  var supa = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // Already signed in (e.g. navigated here by hand)? Skip the form.
  supa.auth.getSession().then(function (res) {
    if (res && res.data && res.data.session) window.location.replace(nextPage());
  });

  function setError(text) {
    msg.textContent = text || '';
    passEl.classList.remove('err');
    if (text) {
      void passEl.offsetWidth; // reflow so the shake re-triggers on repeat errors
      passEl.classList.add('err');
    }
  }

  form.addEventListener('submit', async function (e) {
    e.preventDefault();
    var email = emailEl.value.trim();
    var password = passEl.value;
    if (!email || !password) { setError('Enter your email and password.'); return; }

    btn.disabled = true;
    btn.textContent = 'Signing in…';
    setError('');
    try {
      var res = await supa.auth.signInWithPassword({ email: email, password: password });
      if (res.error) {
        setError(res.error.message || 'Sign-in failed.');
        passEl.value = '';
        passEl.focus();
      } else {
        window.location.replace(nextPage());
        return; // leave the button disabled while navigating away
      }
    } catch (err) {
      setError('Could not reach the sign-in service — try again.');
    }
    btn.disabled = false;
    btn.textContent = 'Sign in';
  });

  [emailEl, passEl].forEach(function (el) {
    el.addEventListener('input', function () { setError(''); });
  });

  try { emailEl.focus(); } catch (e) {}
})();
</script>
</body>
</html>
