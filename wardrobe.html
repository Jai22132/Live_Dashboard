<!DOCTYPE html>
<html lang="en">
<head>
<script src="/api/config"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<title>Wardrobe · Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>

<style>
/* ===== Shared design tokens (same as the rest of the dashboard) ===== */
:root {
  --text-primary: #FAFAFA;
  --text-secondary: #B8B6B0;
  --text-tertiary: #76746E;
  --success: #6BE3A4;
  --warning: #F2C063;
  --danger:  #FF6B6B;
  --accent:  #5EEAD4;                 /* Wardrobe's own accent (matches hub tile) */
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: #050506;
  color: var(--text-secondary);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  -webkit-text-size-adjust: 100%;
}
body {
  min-height: 100vh; position: relative; overflow-x: hidden;
  padding: max(28px, env(safe-area-inset-top)) 20px 60px;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background:
    radial-gradient(circle at 82% 14%, rgba(224, 118, 88, 0.16), transparent 45%),
    radial-gradient(circle at 18% 90%, rgba(180, 180, 200, 0.06), transparent 50%);
  filter: blur(40px); pointer-events: none; z-index: -2;
  animation: drift 36s ease-in-out infinite alternate;
}
body::after {
  content: ''; position: fixed; inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px);
  background-size: 3px 3px; pointer-events: none; z-index: -1;
}
@keyframes drift { 0%{transform:translate3d(0,0,0)} 100%{transform:translate3d(-22px,14px,0)} }

.page { max-width: 1100px; margin: 0 auto; }
.dash-title {
  margin: 0 0 4px; font-size: 28px; font-weight: 700; letter-spacing: -0.025em;
  background: linear-gradient(180deg, #FFFFFF 0%, #C7C4BC 120%);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent; color: transparent;
}
.dash-sub { font-size: 13px; color: var(--text-tertiary); margin: 0 0 18px; }
@media (max-width: 480px) { .dash-title { font-size: 22px; } }

/* ===== Toolbar: filter chips + add button ===== */
.wd-toolbar {
  display: flex; align-items: flex-start; gap: 12px;
  margin-bottom: 16px; flex-wrap: wrap;
}
.wd-filters {
  display: flex; flex-wrap: wrap; gap: 7px; flex: 1; min-width: 0;
}
.wd-chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 13px; border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.035);
  color: var(--text-tertiary);
  font-family: inherit; font-size: 12.5px; font-weight: 600;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
  text-transform: capitalize;
}
.wd-chip:hover { color: var(--text-secondary); background: rgba(255,255,255,0.06); }
.wd-chip.active {
  color: #04201B;
  background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 92%, #FFF), var(--accent));
  border-color: transparent;
}
.wd-chip-count {
  font-family: var(--font-mono); font-size: 10.5px; font-weight: 700;
  padding: 1px 6px; border-radius: 999px;
  background: rgba(255,255,255,0.08); color: var(--text-tertiary);
  font-variant-numeric: tabular-nums;
}
.wd-chip.active .wd-chip-count { background: rgba(4,32,27,0.18); color: #04201B; }

.wd-add-btn {
  flex-shrink: 0;
  display: inline-flex; align-items: center; gap: 7px;
  padding: 10px 18px; border: 0; border-radius: 12px;
  background: linear-gradient(180deg, #FFFFFF 0%, #E8E5DD 100%);
  color: #0A0A0B; font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), 0 2px 8px rgba(0,0,0,0.35), 0 8px 22px rgba(0,0,0,0.25);
  transition: transform 0.1s, filter 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.wd-add-btn:hover { filter: brightness(1.06); transform: translateY(-1px); }
.wd-add-btn:active { transform: translateY(0); }
.wd-add-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; filter: none; }

/* Config warning (shown when Supabase isn't available) */
.wd-warn {
  display: none;
  margin: 0 0 16px; padding: 12px 14px;
  border: 1px solid rgba(242,192,99,0.3); border-radius: 12px;
  background: rgba(242,192,99,0.08); color: var(--warning);
  font-size: 12.5px; line-height: 1.5;
}
.wd-warn.show { display: block; }

/* ===== Grid of items ===== */
.wd-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(158px, 1fr));
  gap: 14px;
}
.empty-state {
  text-align: center; font-size: 13px; font-style: italic;
  color: var(--text-tertiary); padding: 48px 20px;
  grid-column: 1 / -1;
}
.wd-card {
  position: relative; display: flex; flex-direction: column;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 16px; overflow: hidden;
  backdrop-filter: blur(24px) saturate(1.2);
  -webkit-backdrop-filter: blur(24px) saturate(1.2);
  box-shadow: 0 12px 40px rgba(0,0,0,0.45);
  transition: transform 0.18s ease, border-color 0.18s ease;
}
.wd-card:hover { transform: translateY(-3px); border-color: color-mix(in srgb, var(--accent) 30%, transparent); }

.wd-photo-wrap {
  position: relative; width: 100%; aspect-ratio: 3 / 4;
  background: rgba(0,0,0,0.35);
  cursor: pointer; overflow: hidden;
}
.wd-photo {
  width: 100%; height: 100%; object-fit: cover; display: block;
  transition: opacity 0.18s ease;
}
.wd-photo-empty {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  font-size: 30px; opacity: 0.3;
}
/* photo indicator dots (only when 2 photos) */
.wd-dots {
  position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 5px; pointer-events: none;
}
.wd-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: rgba(255,255,255,0.4);
  box-shadow: 0 0 3px rgba(0,0,0,0.6);
  transition: background 0.15s;
}
.wd-dot.on { background: rgba(255,255,255,0.95); }

.wd-card-body { padding: 11px 12px; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.wd-card-meta { min-width: 0; }
.wd-cat {
  font-size: 13px; font-weight: 600; color: var(--text-primary);
  text-transform: capitalize; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.wd-date { font-size: 10.5px; color: var(--text-tertiary); margin-top: 2px; font-variant-numeric: tabular-nums; }

.wd-actions { display: flex; align-items: center; gap: 2px; flex-shrink: 0; }
.wd-icon-btn {
  border: 0; background: transparent; color: var(--text-tertiary);
  font-size: 15px; line-height: 1; cursor: pointer;
  padding: 5px 6px; border-radius: 8px;
  transition: background 0.15s, color 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.wd-icon-btn:hover { background: rgba(255,255,255,0.06); color: var(--text-primary); }
.wd-icon-btn.wd-del:hover { color: var(--danger); }

/* inline delete confirm overlay on a card */
.wd-confirm {
  position: absolute; inset: 0; z-index: 2;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px;
  padding: 16px; text-align: center;
  background: rgba(6,6,8,0.82); backdrop-filter: blur(3px);
}
.wd-confirm-text { font-size: 12.5px; color: var(--text-secondary); line-height: 1.4; }
.wd-confirm-row { display: flex; gap: 8px; }
.wd-btn-danger {
  padding: 8px 15px; border: 0; border-radius: 10px; cursor: pointer;
  background: var(--danger); color: #2A0808;
  font-family: inherit; font-size: 12px; font-weight: 700;
}
.wd-btn-ghost {
  padding: 8px 15px; border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; cursor: pointer;
  background: rgba(255,255,255,0.05); color: var(--text-primary);
  font-family: inherit; font-size: 12px; font-weight: 600;
}

/* ===== Modal (add / edit) — reuses the shared modal class names so
   topbar.js's mobile-fullscreen + scroll-lock apply automatically ===== */
.modal-bg {
  position: fixed; inset: 0; z-index: 120; display: none;
  align-items: center; justify-content: center; padding: 20px;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
}
.modal-bg.show { display: flex; }
.modal {
  width: 100%; max-width: 460px; max-height: 88vh; overflow-y: auto;
  background: #0e0e10; border: 1px solid rgba(255,255,255,0.08);
  border-radius: 18px; padding: 22px; box-shadow: 0 24px 70px rgba(0,0,0,0.6);
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
.modal-title { font-size: 18px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.01em; }
.modal-close { border: 0; background: transparent; color: var(--text-tertiary); font-size: 26px; line-height: 1; cursor: pointer; padding: 0 4px; }
.modal-close:hover { color: var(--text-primary); }

.field { margin-bottom: 16px; }
.field-label { font-size: 11px; font-weight: 700; letter-spacing: 0.10em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 8px; display: block; }

/* photo slots */
.wd-slots { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.wd-slot {
  position: relative; aspect-ratio: 3 / 4;
  border: 1.5px dashed rgba(255,255,255,0.16); border-radius: 14px;
  background: rgba(0,0,0,0.28); overflow: hidden; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: border-color 0.15s, background 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.wd-slot:hover { border-color: rgba(255,255,255,0.3); background: rgba(0,0,0,0.36); }
.wd-slot.filled { border-style: solid; border-color: rgba(255,255,255,0.1); }
.wd-slot img { width: 100%; height: 100%; object-fit: cover; }
.wd-slot-placeholder {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  color: var(--text-tertiary); font-size: 11.5px; font-weight: 600; text-align: center; padding: 8px;
}
.wd-slot-placeholder .wd-slot-plus { font-size: 26px; line-height: 1; opacity: 0.7; }
.wd-slot-clear {
  position: absolute; top: 6px; right: 6px; z-index: 2;
  width: 26px; height: 26px; border: 0; border-radius: 8px;
  background: rgba(6,6,8,0.7); color: #FFF;
  font-size: 16px; line-height: 1; cursor: pointer;
  display: none; align-items: center; justify-content: center;
}
.wd-slot.filled .wd-slot-clear { display: flex; }
/* Photo 1 is required — you can replace it (tap to re-pick) but not empty it. */
#wdSlot0 .wd-slot-clear { display: none; }
.wd-slot-tag {
  position: absolute; bottom: 6px; left: 6px; z-index: 1;
  font-size: 9.5px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
  padding: 3px 7px; border-radius: 6px;
  background: rgba(6,6,8,0.66); color: var(--text-secondary);
}

/* category select + add-new */
.wd-cat-row { display: flex; gap: 8px; }
.wd-select {
  flex: 1; min-width: 0; padding: 11px 13px;
  border: 1px solid rgba(255,255,255,0.08); border-radius: 11px;
  background: rgba(0,0,0,0.3); color: var(--text-primary);
  font-family: inherit; font-size: 14px; outline: none;
  color-scheme: dark; text-transform: capitalize; transition: border-color 0.2s;
}
.wd-select:focus { border-color: rgba(255,255,255,0.28); }
.wd-newcat-btn {
  flex-shrink: 0; padding: 9px 14px; border: 1px solid rgba(255,255,255,0.10);
  border-radius: 11px; background: rgba(255,255,255,0.04); color: var(--text-primary);
  font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer;
  transition: background 0.15s, border-color 0.15s; white-space: nowrap;
}
.wd-newcat-btn:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.18); }
.wd-newcat { display: none; margin-top: 8px; gap: 8px; }
.wd-newcat.show { display: flex; }
.wd-input {
  flex: 1; min-width: 0; padding: 11px 13px;
  border: 1px solid rgba(255,255,255,0.08); border-radius: 11px;
  background: rgba(0,0,0,0.3); color: var(--text-primary);
  font-family: inherit; font-size: 14px; outline: none; transition: border-color 0.2s;
}
.wd-input:focus { border-color: rgba(255,255,255,0.28); }

.wd-save {
  width: 100%; margin-top: 6px; padding: 13px; border: 0; border-radius: 12px;
  background: linear-gradient(180deg,#FFFFFF,#E8E5DD); color: #0A0A0B;
  font-family: inherit; font-size: 14px; font-weight: 700; cursor: pointer;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), 0 8px 22px rgba(0,0,0,0.25);
  transition: filter 0.15s, transform 0.1s;
}
.wd-save:hover { filter: brightness(1.05); }
.wd-save:active { transform: translateY(1px); }
.wd-save:disabled { opacity: 0.55; cursor: progress; }
.wd-status { text-align: center; font-size: 12px; min-height: 16px; margin-top: 10px; color: var(--text-tertiary); }
.wd-status.err { color: var(--danger); }

/* ===== Weather strip ===== */
.wd-weather { margin: 0 0 16px; }
.wd-weather-strip {
  display: flex; gap: 8px; overflow-x: auto; padding: 2px 0 6px;
  -webkit-overflow-scrolling: touch; scrollbar-width: none;
}
.wd-weather-strip::-webkit-scrollbar { display: none; }
.wd-hour {
  flex: 0 0 auto; min-width: 60px;
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  padding: 10px 10px 11px; border-radius: 13px;
  border: 1px solid rgba(255,255,255,0.06);
  background: rgba(255,255,255,0.035);
  backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
}
.wd-hour.now {
  border-color: color-mix(in srgb, var(--accent) 34%, transparent);
  background: color-mix(in srgb, var(--accent) 9%, rgba(255,255,255,0.035));
}
.wd-hour-time { font-size: 10.5px; font-weight: 700; letter-spacing: 0.03em; color: var(--text-tertiary); text-transform: uppercase; }
.wd-hour.now .wd-hour-time { color: var(--accent); }
.wd-hour-icon { font-size: 19px; line-height: 1; }
.wd-hour-temp { font-size: 14px; font-weight: 700; color: var(--text-primary); font-variant-numeric: tabular-nums; }
.wd-hour-pop {
  display: inline-flex; align-items: center; gap: 2px;
  font-size: 10px; font-weight: 600; color: #7DD3FC; font-variant-numeric: tabular-nums;
  min-height: 12px;
}
.wd-hour-pop.dry { color: var(--text-tertiary); opacity: 0.45; }
.wd-weather-msg {
  padding: 11px 14px; border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.06); background: rgba(255,255,255,0.03);
  color: var(--text-tertiary); font-size: 12.5px; line-height: 1.5;
}
.wd-weather-loading { color: var(--text-tertiary); font-size: 12.5px; padding: 4px 2px; }

/* ===== Items / Outfits tabs ===== */
.wd-tabs {
  display: inline-flex; gap: 4px; margin: 0 0 18px;
  padding: 4px; border-radius: 13px;
  border: 1px solid rgba(255,255,255,0.07); background: rgba(255,255,255,0.03);
}
.wd-tab {
  border: 0; border-radius: 9px; cursor: pointer;
  padding: 8px 18px; font-family: inherit; font-size: 13px; font-weight: 700;
  color: var(--text-tertiary); background: transparent;
  -webkit-tap-highlight-color: transparent;
  transition: color 0.15s, background 0.15s;
}
.wd-tab:hover { color: var(--text-secondary); }
.wd-tab.active {
  color: #04201B;
  background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 92%, #FFF), var(--accent));
}

/* notes on the item card */
.wd-notes {
  font-size: 11px; color: var(--text-secondary); margin-top: 3px; line-height: 1.35;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  overflow-wrap: anywhere;
}

/* notes textarea in the modal */
.wd-textarea {
  width: 100%; min-height: 66px; resize: vertical;
  padding: 11px 13px; border: 1px solid rgba(255,255,255,0.08); border-radius: 11px;
  background: rgba(0,0,0,0.3); color: var(--text-primary);
  font-family: inherit; font-size: 14px; line-height: 1.4; outline: none; transition: border-color 0.2s;
}
.wd-textarea:focus { border-color: rgba(255,255,255,0.28); }

/* ===== Outfit cards ===== */
.wd-outfit-collage {
  position: relative; width: 100%; aspect-ratio: 3 / 4;
  display: grid; gap: 2px; background: rgba(0,0,0,0.35);
}
.wd-outfit-collage.n1 { grid-template-columns: 1fr; grid-template-rows: 1fr; }
.wd-outfit-collage.n2 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr; }
.wd-outfit-collage.n3, .wd-outfit-collage.n4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
.wd-outfit-collage.n3 .wd-collage-cell:first-child { grid-row: span 2; }
.wd-collage-cell {
  position: relative; overflow: hidden; background: rgba(0,0,0,0.4);
  display: flex; align-items: center; justify-content: center;
}
.wd-collage-cell img { width: 100%; height: 100%; object-fit: cover; display: block; }
.wd-collage-cell .wd-collage-ph { font-size: 24px; opacity: 0.3; }
.wd-collage-more {
  position: absolute; right: 6px; bottom: 6px; z-index: 1;
  padding: 2px 8px; border-radius: 999px;
  background: rgba(6,6,8,0.72); color: var(--text-primary);
  font-size: 10.5px; font-weight: 700; font-variant-numeric: tabular-nums;
}
.wd-outfit-empty {
  width: 100%; aspect-ratio: 3 / 4; display: flex; align-items: center; justify-content: center;
  font-size: 30px; opacity: 0.3;
}
.wd-outfit-name { font-size: 13px; font-weight: 600; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ===== Outfit item picker (in modal) ===== */
.wd-pick-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(84px, 1fr));
  gap: 9px; max-height: 46vh; overflow-y: auto; padding: 2px;
}
.wd-pick {
  position: relative; border-radius: 11px; overflow: hidden; cursor: pointer;
  border: 2px solid transparent; background: rgba(0,0,0,0.3);
  -webkit-tap-highlight-color: transparent; transition: border-color 0.15s;
}
.wd-pick-photo { width: 100%; aspect-ratio: 3 / 4; }
.wd-pick-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
.wd-pick-photo .wd-collage-ph { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 24px; opacity: 0.3; }
.wd-pick-cat {
  font-size: 10px; font-weight: 600; color: var(--text-secondary);
  padding: 5px 6px; text-transform: capitalize;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: center;
}
.wd-pick.sel { border-color: var(--accent); }
.wd-pick-check {
  position: absolute; top: 5px; right: 5px; z-index: 1;
  width: 22px; height: 22px; border-radius: 50%;
  display: none; align-items: center; justify-content: center;
  background: var(--accent); color: #04201B; font-size: 13px; font-weight: 800;
  box-shadow: 0 2px 6px rgba(0,0,0,0.4);
}
.wd-pick.sel .wd-pick-check { display: flex; }
.wd-pick-empty { grid-column: 1 / -1; text-align: center; font-size: 12.5px; font-style: italic; color: var(--text-tertiary); padding: 24px 12px; }

@media (max-width: 480px) {
  body { padding: max(20px, env(safe-area-inset-top)) 14px 50px; }
  .wd-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
  .wd-add-btn { padding: 10px 15px; }
}
</style>
</head>
<body>
<div class="page">

  <h1 class="dash-title">Wardrobe</h1>
  <p class="dash-sub">Your clothing catalog — two photos per item.</p>

  <!-- Weather forecast (client-side, geolocation + Open-Meteo) -->
  <div class="wd-weather" id="wdWeather"></div>

  <!-- Items / Outfits tabs -->
  <div class="wd-tabs" role="tablist" aria-label="Wardrobe views">
    <button class="wd-tab active" id="wdTabItems" data-tab="items" type="button" role="tab" aria-selected="true">Items</button>
    <button class="wd-tab" id="wdTabOutfits" data-tab="outfits" type="button" role="tab" aria-selected="false">Outfits</button>
  </div>

  <div class="wd-warn" id="wdWarn">
    Cloud storage isn't configured for this session, so photos can't be uploaded.
    Open the dashboard on its deployed URL (where Supabase is set up) to add items.
  </div>

  <!-- ===== Items view ===== -->
  <div id="wdItemsView">
    <div class="wd-toolbar">
      <div class="wd-filters" id="wdFilters"></div>
      <button class="wd-add-btn" id="wdAddBtn" type="button">＋ Add item</button>
    </div>
    <div class="wd-grid" id="wdGrid"></div>
  </div>

  <!-- ===== Outfits view ===== -->
  <div id="wdOutfitsView" style="display:none">
    <div class="wd-toolbar">
      <div class="wd-filters" style="flex:1"></div>
      <button class="wd-add-btn" id="wdOutfitAddBtn" type="button">＋ New outfit</button>
    </div>
    <div class="wd-grid" id="wdOutfitGrid"></div>

<script>
(function () {
  'use strict';
  const $ = (id) => document.getElementById(id);

  // -------- Supabase config (same project + public key as the rest of the app) --------
  const SUPABASE_URL = (window.DASH_SUPABASE_URL) || 'https://awytpwgorebhjewlqlhs.supabase.co';
  const SUPABASE_KEY = (window.DASH_SUPABASE_KEY) || 'sb_publishable_iyTy90Bi9Ct9ZMY0nu9hjA_N5BFmlFN';
  const BUCKET = 'wardrobe-photos';

  let _supa = null;
  function supaClient() {
    if (_supa) return _supa;
    if (!window.supabase || !SUPABASE_URL || !SUPABASE_KEY) return null;
    if (SUPABASE_URL.indexOf('PASTE-') === 0 || SUPABASE_KEY.indexOf('PASTE-') === 0) return null;
    // Reuse the shared authenticated client from auth.js when present so
    // storage uploads/deletes carry the user's JWT (required once the
    // bucket policies are tightened to the `authenticated` role).
    if (window.DashAuth && window.DashAuth.client) { _supa = window.DashAuth.client; return _supa; }
    try { _supa = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY); } catch (e) { return null; }
    return _supa;
  }
  function storageReady() { return !!supaClient(); }

  // ===================== data model =====================
  // localStorage key 'wardrobe_items' holds:
  //   { items: [ { id, category, photo_paths: [p1, p2], added_date, notes } ],
  //     categories: ['t-shirt', ...] }
  //   `notes` is the user's own free text (brand/size/etc). It is SEPARATE from
  //   the AI-generated `description` field written by the nova-batch script —
  //   that field is left untouched here.
  // localStorage key 'wardrobe_outfits' holds:
  //   { outfits: [ { id, name, item_ids: [...], created_date } ] }
  // The sync helper mirrors BOTH keys into the single app_state row 'wardrobe'.
  const STORE_KEY = 'wardrobe_items';
  const OUTFITS_KEY = 'wardrobe_outfits';
  const DEFAULT_CATEGORIES = ['t-shirt', 'trousers', 'shoes', 'trainers'];

  function loadStore() {
    let s = null;
    try { s = JSON.parse(localStorage.getItem(STORE_KEY)); } catch (e) {}
    if (!s || typeof s !== 'object') s = {};
    if (!Array.isArray(s.items)) s.items = [];
    if (!Array.isArray(s.categories) || !s.categories.length) s.categories = DEFAULT_CATEGORIES.slice();
    return s;
  }
  function saveStore(s) {
    try { localStorage.setItem(STORE_KEY, JSON.stringify(s)); } catch (e) {}
  }
  function loadOutfits() {
    let s = null;
    try { s = JSON.parse(localStorage.getItem(OUTFITS_KEY)); } catch (e) {}
    if (!s || typeof s !== 'object') s = {};
    if (!Array.isArray(s.outfits)) s.outfits = [];
    return s;
  }
  function saveOutfits(s) {
    try { localStorage.setItem(OUTFITS_KEY, JSON.stringify(s)); } catch (e) {}
  }
  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
  function todayStr() {
    const d = new Date();
    return d.getFullYear() + '-' +
      String(d.getMonth() + 1).padStart(2, '0') + '-' +
      String(d.getDate()).padStart(2, '0');
  }
  function formatDate(s) {
    if (!s) return '';
    const p = String(s).split('-').map(Number);
    if (p.length !== 3 || !p[0]) return s;
    const mo = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][p[1] - 1];
    return mo + ' ' + p[2] + ', ' + p[0];
  }

  let store = loadStore();
  let outfits = loadOutfits();
  let activeFilter = 'all';
  let activeTab = 'items';

  // ===================== image compression =====================
  // Decode → scale so the longest side is 800px (never upscale) → JPEG @0.72.
  const MAX_SIDE = 800;
  const JPEG_QUALITY = 0.72;

  async function decodeImage(file) {
    if ('createImageBitmap' in window) {
      try { return await createImageBitmap(file, { imageOrientation: 'from-image' }); }
      catch (e) { /* Safari fallback below */ }
    }
    return await new Promise((resolve, reject) => {
      const img = new Image();
      const url = URL.createObjectURL(file);
      img.onload = () => { URL.revokeObjectURL(url); resolve(img); };
      img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('Could not read image')); };
      img.src = url;
    });
  }
  async function compressImage(file) {
    const bmp = await decodeImage(file);
    const w0 = bmp.width, h0 = bmp.height;
    const scale = Math.min(1, MAX_SIDE / Math.max(w0, h0));
    const w = Math.max(1, Math.round(w0 * scale));
    const h = Math.max(1, Math.round(h0 * scale));
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(bmp, 0, 0, w, h);
    if (bmp.close) bmp.close();
    const blob = await new Promise((res) => canvas.toBlob(res, 'image/jpeg', JPEG_QUALITY));
    if (!blob) throw new Error('Image processing failed');
    return blob;
  }

  // ===================== storage ops =====================
  async function uploadPhoto(itemId, slot, file) {
    const s = supaClient();
    if (!s) throw new Error('Storage unavailable');
    const blob = await compressImage(file);
    const path = 'items/' + itemId + '_' + slot + '_' + uid() + '.jpg';
    const { error } = await s.storage.from(BUCKET).upload(path, blob, {
      contentType: 'image/jpeg', cacheControl: '3600', upsert: false,
    });
    if (error) throw error;
    return path;
  }
  async function deletePhotos(paths) {
    const s = supaClient();
    const list = (paths || []).filter(Boolean);
    if (!s || !list.length) return;
    try { await s.storage.from(BUCKET).remove(list); } catch (e) { /* best effort */ }
  }
  function publicUrl(path) {
    const s = supaClient();
    if (!s || !path) return '';
    try { const { data } = s.storage.from(BUCKET).getPublicUrl(path); return (data && data.publicUrl) || ''; }
    catch (e) { return ''; }
  }

  // ===================== filters =====================
  function renderFilters() {
    const wrap = $('wdFilters');
    wrap.innerHTML = '';
    const counts = { all: store.items.length };
    store.categories.forEach(c => { counts[c] = 0; });
    store.items.forEach(it => { if (counts[it.category] == null) counts[it.category] = 0; counts[it.category]++; });

    // 'All' + every known category (defaults, customs, and any orphaned category on an item).
    const cats = ['all'];
    store.categories.forEach(c => { if (cats.indexOf(c) === -1) cats.push(c); });
    store.items.forEach(it => { if (it.category && cats.indexOf(it.category) === -1) cats.push(it.category); });

    // if the active filter no longer exists, fall back to 'all'
    if (activeFilter !== 'all' && cats.indexOf(activeFilter) === -1) activeFilter = 'all';

    cats.forEach(cat => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'wd-chip' + (cat === activeFilter ? ' active' : '');
      const label = document.createElement('span');
      label.textContent = cat === 'all' ? 'All' : cat;
      btn.appendChild(label);
      const cnt = document.createElement('span');
      cnt.className = 'wd-chip-count';
      cnt.textContent = counts[cat] || 0;
      btn.appendChild(cnt);
      btn.addEventListener('click', () => { activeFilter = cat; render(); });
      wrap.appendChild(btn);
    });
  }

  // ===================== grid =====================
  function renderGrid() {
    const grid = $('wdGrid');
    grid.innerHTML = '';
    const items = store.items.filter(it => activeFilter === 'all' || it.category === activeFilter);

    if (!items.length) {
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.textContent = store.items.length
        ? 'Nothing in this category yet.'
        : 'Your wardrobe is empty — tap “＋ Add item” to catalog your first piece.';
      grid.appendChild(empty);
      return;
    }

    items.forEach(it => grid.appendChild(buildCard(it)));
  }

  function buildCard(item) {
    const card = document.createElement('div');
    card.className = 'wd-card';

    const paths = (item.photo_paths || []).filter(Boolean);

    // photo area (tap to toggle between the item's photos)
    const wrap = document.createElement('div');
    wrap.className = 'wd-photo-wrap';
    if (paths.length) {
      let idx = 0;
      const img = document.createElement('img');
      img.className = 'wd-photo';
      img.loading = 'lazy';
      img.alt = item.category || 'Clothing item';
      img.src = publicUrl(paths[0]);
      img.addEventListener('error', () => { wrap.classList.add('broken'); });
      wrap.appendChild(img);

      if (paths.length > 1) {
        const dots = document.createElement('div');
        dots.className = 'wd-dots';
        const dotEls = paths.map((_, i) => {
          const d = document.createElement('span');
          d.className = 'wd-dot' + (i === 0 ? ' on' : '');
          dots.appendChild(d);
          return d;
        });
        wrap.appendChild(dots);
        wrap.addEventListener('click', () => {
          idx = (idx + 1) % paths.length;
          img.src = publicUrl(paths[idx]);
          dotEls.forEach((d, i) => d.classList.toggle('on', i === idx));
        });
        wrap.title = 'Tap to see the other photo';
      }
    } else {
      const ph = document.createElement('div');
      ph.className = 'wd-photo-empty';
      ph.textContent = '👕';
      wrap.appendChild(ph);
    }
    card.appendChild(wrap);

    // body: category + date + actions
    const body = document.createElement('div');
    body.className = 'wd-card-body';

    const meta = document.createElement('div');
    meta.className = 'wd-card-meta';
    const cat = document.createElement('div');
    cat.className = 'wd-cat';
    cat.textContent = item.category || 'Uncategorized';
    meta.appendChild(cat);
    if (item.notes && String(item.notes).trim()) {
      const nt = document.createElement('div');
      nt.className = 'wd-notes';
      nt.textContent = String(item.notes).trim();
      nt.title = String(item.notes).trim();
      meta.appendChild(nt);
    }
    if (item.added_date) {
      const dt = document.createElement('div');
      dt.className = 'wd-date';
      dt.textContent = formatDate(item.added_date);
      meta.appendChild(dt);
    }
    body.appendChild(meta);

    const actions = document.createElement('div');
    actions.className = 'wd-actions';
    const editBtn = document.createElement('button');
    editBtn.type = 'button';
    editBtn.className = 'wd-icon-btn';
    editBtn.title = 'Edit';
    editBtn.setAttribute('aria-label', 'Edit item');
    editBtn.textContent = '✎';
    editBtn.addEventListener('click', () => openEdit(item.id));
    actions.appendChild(editBtn);

    const delBtn = document.createElement('button');
    delBtn.type = 'button';
    delBtn.className = 'wd-icon-btn wd-del';
    delBtn.title = 'Delete';
    delBtn.setAttribute('aria-label', 'Delete item');
    delBtn.textContent = '×';
    delBtn.addEventListener('click', () => showDeleteConfirm(card, item.id));
    actions.appendChild(delBtn);

    body.appendChild(actions);
    card.appendChild(body);
    return card;
  }

  // inline delete confirm over the card
  function showDeleteConfirm(card, id) {
    if (card.querySelector('.wd-confirm')) return;
    const overlay = document.createElement('div');
    overlay.className = 'wd-confirm';
    const text = document.createElement('div');
    text.className = 'wd-confirm-text';
    text.textContent = 'Delete this item and its photos?';
    const row = document.createElement('div');
    row.className = 'wd-confirm-row';
    const yes = document.createElement('button');
    yes.type = 'button'; yes.className = 'wd-btn-danger'; yes.textContent = 'Delete';
    const no = document.createElement('button');
    no.type = 'button'; no.className = 'wd-btn-ghost'; no.textContent = 'Cancel';
    yes.addEventListener('click', async () => {
      yes.disabled = true; no.disabled = true; yes.textContent = 'Deleting…';
      await deleteItem(id);
    });
    no.addEventListener('click', () => overlay.remove());
    row.appendChild(yes); row.appendChild(no);
    overlay.appendChild(text); overlay.appendChild(row);
    card.appendChild(overlay);
  }

  async function deleteItem(id) {
    const item = store.items.find(it => it.id === id);
    if (!item) { render(); return; }
    // remove the files from Storage first so nothing is orphaned in the bucket
    await deletePhotos(item.photo_paths || []);
    store.items = store.items.filter(it => it.id !== id);
    saveStore(store);
    // auto-remove this item from any saved outfits that referenced it
    let outfitsChanged = false;
    outfits.outfits.forEach(o => {
      const before = o.item_ids.length;
      o.item_ids = (o.item_ids || []).filter(x => x !== id);
      if (o.item_ids.length !== before) outfitsChanged = true;
    });
    if (outfitsChanged) saveOutfits(outfits);
    render();
  }

  // ===================== add / edit modal =====================
  // Per-slot working state: existing path (edit), a freshly picked File, and a
  // preview object-URL we must revoke on close.
  let editingId = null;
  const slots = [newSlot(), newSlot()];
  function newSlot() { return { existingPath: null, file: null, previewUrl: null }; }

  function resetSlots() {
    slots.forEach(freeSlot);
    slots[0] = newSlot();
    slots[1] = newSlot();
  }
  function freeSlot(s) {
    if (s && s.previewUrl) { try { URL.revokeObjectURL(s.previewUrl); } catch (e) {} s.previewUrl = null; }
  }

  function renderCategoryOptions(selected) {
    const sel = $('wdCategory');
    sel.innerHTML = '';
    store.categories.forEach(c => {
      const o = document.createElement('option');
      o.value = c; o.textContent = c;
      sel.appendChild(o);
    });
    if (selected && store.categories.indexOf(selected) === -1) {
      const o = document.createElement('option');
      o.value = selected; o.textContent = selected;
      sel.appendChild(o);
    }
    sel.value = selected || store.categories[0] || '';
  }

  function renderSlot(i) {
    const el = $('wdSlot' + i);
    const s = slots[i];
    const placeholder = el.querySelector('.wd-slot-placeholder');
    let img = el.querySelector('img');
    const src = s.previewUrl || (s.existingPath ? publicUrl(s.existingPath) : '');
    if (src) {
      if (!img) { img = document.createElement('img'); el.insertBefore(img, el.querySelector('.wd-slot-clear')); }
      img.src = src;
      el.classList.add('filled');
      if (placeholder) placeholder.style.display = 'none';
    } else {
      if (img) img.remove();
      el.classList.remove('filled');
      if (placeholder) placeholder.style.display = '';
    }
  }
  function renderSlots() { renderSlot(0); renderSlot(1); }

  function onPickFile(i, file) {
    if (!file) return;
    if (!/^image\//.test(file.type)) { setStatus('Please choose an image file.', true); return; }
    const s = slots[i];
    freeSlot(s);
    s.file = file;
    s.previewUrl = URL.createObjectURL(file);
    setStatus('');
    renderSlot(i);
  }
  function clearSlot(i) {
    const s = slots[i];
    freeSlot(s);
    s.file = null;
    s.existingPath = null;      // marks it for removal on save if it had one
    $('wdFile' + i).value = '';
    renderSlot(i);
  }

  function setStatus(msg, isErr) {
    const el = $('wdStatus');
    el.textContent = msg || '';
    el.classList.toggle('err', !!isErr);
  }

  function openAdd() {
    editingId = null;
    resetSlots();
    $('wdModalTitle').textContent = 'Add item';
    $('wdSave').textContent = 'Save item';
    renderCategoryOptions(null);
    hideNewCat();
    renderSlots();
    $('wdNotes').value = '';
    setStatus(storageReady() ? '' : 'Cloud storage unavailable — cannot upload right now.', !storageReady());
    $('wdModalBg').classList.add('show');
  }
  function openEdit(id) {
    const item = store.items.find(it => it.id === id);
    if (!item) return;
    editingId = id;
    resetSlots();
    const paths = (item.photo_paths || []).filter(Boolean);
    slots[0].existingPath = paths[0] || null;
    slots[1].existingPath = paths[1] || null;
    $('wdModalTitle').textContent = 'Edit item';
    $('wdSave').textContent = 'Save changes';
    renderCategoryOptions(item.category);
    hideNewCat();
    renderSlots();
    $('wdNotes').value = item.notes || '';
    setStatus('');
    $('wdModalBg').classList.add('show');
  }
  function closeModal() {
    $('wdModalBg').classList.remove('show');
    resetSlots();
    $('wdFile0').value = ''; $('wdFile1').value = '';
    $('wdNotes').value = '';
    hideNewCat();
  }

  // add-a-category (persists immediately so it syncs across devices)
  function showNewCat() { $('wdNewCatWrap').classList.add('show'); $('wdNewCatInput').focus(); }
  function hideNewCat() { $('wdNewCatWrap').classList.remove('show'); $('wdNewCatInput').value = ''; }
  function addCategory() {
    const raw = $('wdNewCatInput').value.trim().toLowerCase();
    if (!raw) { $('wdNewCatInput').focus(); return; }
    if (store.categories.indexOf(raw) === -1) {
      store.categories.push(raw);
      saveStore(store);
    }
    renderCategoryOptions(raw);
    hideNewCat();
    renderFilters();
  }

  async function submit() {
    if (!storageReady()) { setStatus('Cloud storage unavailable — cannot save right now.', true); return; }

    const category = $('wdCategory').value;
    if (!category) { setStatus('Pick a category first.', true); return; }
    const notes = $('wdNotes').value.trim();

    // slot 0 is required: it must end up with either a new file or an existing photo
    const hasSlot0 = !!(slots[0].file || slots[0].existingPath);
    if (!hasSlot0) { setStatus('Photo 1 is required.', true); return; }

    const saveBtn = $('wdSave');
    saveBtn.disabled = true;
    setStatus('Uploading…');

    const id = editingId || uid();
    const toDelete = [];    // superseded/removed files to clean up after a successful save
    const uploadedNow = []; // files uploaded in THIS attempt (rolled back if the attempt fails)

    try {
      const finalPaths = [];
      for (let i = 0; i < slots.length; i++) {
        const s = slots[i];
        if (s.file) {
          const newPath = await uploadPhoto(id, i, s.file);
          uploadedNow.push(newPath);
          if (s.existingPath) toDelete.push(s.existingPath);  // replaced → delete old
          finalPaths[i] = newPath;
        } else if (s.existingPath) {
          finalPaths[i] = s.existingPath;                      // unchanged
        } else {
          finalPaths[i] = null;                                // empty / cleared
        }
      }
      // If an existing photo was cleared (no file, no existingPath) but the item
      // previously had one there, delete that old file too.
      if (editingId) {
        const prev = store.items.find(it => it.id === editingId);
        const prevPaths = (prev && prev.photo_paths) || [];
        for (let i = 0; i < prevPaths.length; i++) {
          if (prevPaths[i] && finalPaths[i] !== prevPaths[i] && toDelete.indexOf(prevPaths[i]) === -1) {
            toDelete.push(prevPaths[i]);
          }
        }
      }

      const photo_paths = finalPaths.filter(Boolean);

      if (editingId) {
        const it = store.items.find(x => x.id === editingId);
        if (it) { it.category = category; it.photo_paths = photo_paths; it.notes = notes; }
      } else {
        store.items.unshift({ id, category, photo_paths, added_date: todayStr(), notes });
      }
      saveStore(store);

      // clean up superseded files (best effort, after the reference is safely saved)
      if (toDelete.length) deletePhotos(toDelete);

      closeModal();
      render();
    } catch (e) {
      // roll back the files we managed to upload in this failed attempt so the
      // bucket doesn't accumulate orphans from a half-completed save.
      if (uploadedNow.length) deletePhotos(uploadedNow);
      setStatus('Upload failed: ' + ((e && e.message) || 'unknown error') + '. Please try again.', true);
      saveBtn.disabled = false;
      return;
    }
    saveBtn.disabled = false;
  }

  // ===================== outfits =====================
  function itemById(id) { return store.items.find(it => it.id === id) || null; }

  function renderOutfitGrid() {
    const grid = $('wdOutfitGrid');
    grid.innerHTML = '';
    if (!outfits.outfits.length) {
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.textContent = store.items.length
        ? 'No outfits yet — tap “＋ New outfit” to combine items you own.'
        : 'Add some wardrobe items first, then combine them into outfits here.';
      grid.appendChild(empty);
      return;
    }
    outfits.outfits.forEach(o => grid.appendChild(buildOutfitCard(o)));
  }

  function buildOutfitCard(outfit) {
    const card = document.createElement('div');
    card.className = 'wd-card';

    // resolve referenced items that still exist, plus each one's first photo
    const its = (outfit.item_ids || []).map(itemById).filter(Boolean);
    const thumbs = its.map(it => (it.photo_paths || []).filter(Boolean)[0] || null);

    if (thumbs.length) {
      const shown = thumbs.slice(0, 4);
      const collage = document.createElement('div');
      collage.className = 'wd-outfit-collage n' + shown.length;
      shown.forEach(path => {
        const cell = document.createElement('div');
        cell.className = 'wd-collage-cell';
        if (path) {
          const img = document.createElement('img');
          img.loading = 'lazy'; img.alt = outfit.name || 'Outfit item';
          img.src = publicUrl(path);
          cell.appendChild(img);
        } else {
          const ph = document.createElement('span');
          ph.className = 'wd-collage-ph'; ph.textContent = '👕';
          cell.appendChild(ph);
        }
        collage.appendChild(cell);
      });
      if (thumbs.length > 4) {
        const more = document.createElement('div');
        more.className = 'wd-collage-more';
        more.textContent = '+' + (thumbs.length - 4);
        collage.appendChild(more);
      }
      card.appendChild(collage);
    } else {
      const empty = document.createElement('div');
      empty.className = 'wd-outfit-empty';
      empty.textContent = '🧥';
      card.appendChild(empty);
    }

    const body = document.createElement('div');
    body.className = 'wd-card-body';
    const meta = document.createElement('div');
    meta.className = 'wd-card-meta';
    const name = document.createElement('div');
    name.className = 'wd-outfit-name';
    name.textContent = outfit.name || 'Untitled outfit';
    name.title = outfit.name || '';
    meta.appendChild(name);
    const cnt = document.createElement('div');
    cnt.className = 'wd-date';
    cnt.textContent = its.length + (its.length === 1 ? ' item' : ' items');
    meta.appendChild(cnt);
    body.appendChild(meta);

    const actions = document.createElement('div');
    actions.className = 'wd-actions';
    const editBtn = document.createElement('button');
    editBtn.type = 'button'; editBtn.className = 'wd-icon-btn';
    editBtn.title = 'Edit'; editBtn.setAttribute('aria-label', 'Edit outfit');
    editBtn.textContent = '✎';
    editBtn.addEventListener('click', () => openOutfitEdit(outfit.id));
    actions.appendChild(editBtn);
    const delBtn = document.createElement('button');
    delBtn.type = 'button'; delBtn.className = 'wd-icon-btn wd-del';
    delBtn.title = 'Delete'; delBtn.setAttribute('aria-label', 'Delete outfit');
    delBtn.textContent = '×';
    delBtn.addEventListener('click', () => showOutfitDeleteConfirm(card, outfit.id));
    actions.appendChild(delBtn);
    body.appendChild(actions);
    card.appendChild(body);
    return card;
  }

  function showOutfitDeleteConfirm(card, id) {
    if (card.querySelector('.wd-confirm')) return;
    const overlay = document.createElement('div');
    overlay.className = 'wd-confirm';
    const text = document.createElement('div');
    text.className = 'wd-confirm-text';
    text.textContent = 'Delete this outfit? (Your items are kept.)';
    const row = document.createElement('div');
    row.className = 'wd-confirm-row';
    const yes = document.createElement('button');
    yes.type = 'button'; yes.className = 'wd-btn-danger'; yes.textContent = 'Delete';
    const no = document.createElement('button');
    no.type = 'button'; no.className = 'wd-btn-ghost'; no.textContent = 'Cancel';
    yes.addEventListener('click', () => {
      outfits.outfits = outfits.outfits.filter(o => o.id !== id);
      saveOutfits(outfits);
      render();
    });
    no.addEventListener('click', () => overlay.remove());
    row.appendChild(yes); row.appendChild(no);
    overlay.appendChild(text); overlay.appendChild(row);
    card.appendChild(overlay);
  }

  // ---- outfit editor modal ----
  let outfitEditingId = null;
  let outfitSel = [];   // ordered list of currently-selected item ids

  function setOutfitStatus(msg, isErr) {
    const el = $('wdOutfitStatus');
    el.textContent = msg || '';
    el.classList.toggle('err', !!isErr);
  }
  function updateOutfitCount() {
    $('wdOutfitCount').textContent = outfitSel.length ? '· ' + outfitSel.length + ' selected' : '';
  }

  function renderOutfitPicker() {
    const wrap = $('wdOutfitPicker');
    wrap.innerHTML = '';
    if (!store.items.length) {
      const e = document.createElement('div');
      e.className = 'wd-pick-empty';
      e.textContent = 'No items to pick yet — add wardrobe items first.';
      wrap.appendChild(e);
      updateOutfitCount();
      return;
    }
    store.items.forEach(it => {
      const cell = document.createElement('div');
      cell.className = 'wd-pick' + (outfitSel.indexOf(it.id) !== -1 ? ' sel' : '');
      const photo = document.createElement('div');
      photo.className = 'wd-pick-photo';
      const path = (it.photo_paths || []).filter(Boolean)[0];
      if (path) {
        const img = document.createElement('img');
        img.loading = 'lazy'; img.alt = it.category || 'Item';
        img.src = publicUrl(path);
        photo.appendChild(img);
      } else {
        const ph = document.createElement('div');
        ph.className = 'wd-collage-ph'; ph.textContent = '👕';
        photo.appendChild(ph);
      }
      cell.appendChild(photo);
      const cat = document.createElement('div');
      cat.className = 'wd-pick-cat';
      cat.textContent = it.category || 'Item';
      cell.appendChild(cat);
      const check = document.createElement('div');
      check.className = 'wd-pick-check'; check.textContent = '✓';
      cell.appendChild(check);
      cell.addEventListener('click', () => {
        const i = outfitSel.indexOf(it.id);
        if (i === -1) outfitSel.push(it.id); else outfitSel.splice(i, 1);
        cell.classList.toggle('sel');
        updateOutfitCount();
        setOutfitStatus('');
      });
      wrap.appendChild(cell);
    });
    updateOutfitCount();
  }

  function openOutfitAdd() {
    outfitEditingId = null;
    outfitSel = [];
    $('wdOutfitModalTitle').textContent = 'New outfit';
    $('wdOutfitSave').textContent = 'Save outfit';
    $('wdOutfitName').value = '';
    setOutfitStatus('');
    renderOutfitPicker();
    $('wdOutfitModalBg').classList.add('show');
    $('wdOutfitName').focus();
  }
  function openOutfitEdit(id) {
    const o = outfits.outfits.find(x => x.id === id);
    if (!o) return;
    outfitEditingId = id;
    outfitSel = (o.item_ids || []).filter(x => itemById(x));  // drop any stale ids
    $('wdOutfitModalTitle').textContent = 'Edit outfit';
    $('wdOutfitSave').textContent = 'Save changes';
    $('wdOutfitName').value = o.name || '';
    setOutfitStatus('');
    renderOutfitPicker();
    $('wdOutfitModalBg').classList.add('show');
  }
  function closeOutfitModal() {
    $('wdOutfitModalBg').classList.remove('show');
    outfitSel = [];
  }
  function submitOutfit() {
    const name = $('wdOutfitName').value.trim();
    if (!name) { setOutfitStatus('Give the outfit a name.', true); $('wdOutfitName').focus(); return; }
    if (!outfitSel.length) { setOutfitStatus('Pick at least one item.', true); return; }
    if (outfitEditingId) {
      const o = outfits.outfits.find(x => x.id === outfitEditingId);
      if (o) { o.name = name; o.item_ids = outfitSel.slice(); }
    } else {
      outfits.outfits.unshift({ id: uid(), name, item_ids: outfitSel.slice(), created_date: todayStr() });
    }
    saveOutfits(outfits);
    closeOutfitModal();
    render();
  }

  // ===================== weather (Open-Meteo, client-side) =====================
  // Fetched once per page load, then cached in memory so switching between the
  // Items/Outfits tabs re-renders from cache without hitting the network again.
  let weatherState = { status: 'idle', hours: null };

  const WMO_ICON = {
    0: '☀️',
    1: '🌤️', 2: '⛅', 3: '☁️',
    45: '🌫️', 48: '🌫️',
    51: '🌦️', 53: '🌦️', 55: '🌦️', 56: '🌧️', 57: '🌧️',
    61: '🌧️', 63: '🌧️', 65: '🌧️', 66: '🌧️', 67: '🌧️',
    71: '🌨️', 73: '🌨️', 75: '🌨️', 77: '🌨️',
    80: '🌦️', 81: '🌧️', 82: '🌧️',
    85: '🌨️', 86: '🌨️',
    95: '⛈️', 96: '⛈️', 99: '⛈️',
  };
  function wxIcon(code) { return (code != null && WMO_ICON[code]) || '🌡️'; }

  function renderWeather() {
    const box = $('wdWeather');
    box.innerHTML = '';
    const st = weatherState;
    function msg(text, cls) {
      const m = document.createElement('div');
      m.className = cls || 'wd-weather-msg';
      m.textContent = text;
      box.appendChild(m);
    }
    if (st.status === 'idle' || st.status === 'loading') { msg('Loading local forecast…', 'wd-weather-loading'); return; }
    if (st.status === 'denied') { msg('Location is off, so the local forecast is hidden. Enable location for this site to see the next 12 hours.'); return; }
    if (st.status === 'error' || !st.hours || !st.hours.length) { msg('Couldn’t load the forecast right now.'); return; }

    const strip = document.createElement('div');
    strip.className = 'wd-weather-strip';
    st.hours.forEach((h, i) => {
      const cell = document.createElement('div');
      cell.className = 'wd-hour' + (i === 0 ? ' now' : '');
      const t = document.createElement('div');
      t.className = 'wd-hour-time';
      t.textContent = i === 0 ? 'Now' : h.label;
      cell.appendChild(t);
      const ic = document.createElement('div');
      ic.className = 'wd-hour-icon';
      ic.textContent = h.icon;
      cell.appendChild(ic);
      const tm = document.createElement('div');
      tm.className = 'wd-hour-temp';
      tm.textContent = (h.temp != null) ? Math.round(h.temp) + '°' : '–';
      cell.appendChild(tm);
      const pop = document.createElement('div');
      const hasPop = h.pop != null;
      pop.className = 'wd-hour-pop' + (hasPop && h.pop > 0 ? '' : ' dry');
      pop.textContent = hasPop ? '💧' + h.pop + '%' : '';
      cell.appendChild(pop);
      strip.appendChild(cell);
    });
    box.appendChild(strip);
  }

  function initWeather() {
    if (weatherState.status !== 'idle') { renderWeather(); return; }  // already fetched this session
    if (!('geolocation' in navigator)) { weatherState = { status: 'error', hours: null }; renderWeather(); return; }
    weatherState.status = 'loading';
    renderWeather();
    navigator.geolocation.getCurrentPosition(
      (pos) => fetchWeather(pos.coords.latitude, pos.coords.longitude),
      (err) => {
        weatherState = { status: (err && err.code === err.PERMISSION_DENIED) ? 'denied' : 'error', hours: null };
        renderWeather();
      },
      { enableHighAccuracy: false, timeout: 10000, maximumAge: 10 * 60 * 1000 }
    );
  }

  async function fetchWeather(lat, lon) {
    try {
      const url = 'https://api.open-meteo.com/v1/forecast'
        + '?latitude=' + encodeURIComponent(lat.toFixed(4))
        + '&longitude=' + encodeURIComponent(lon.toFixed(4))
        + '&hourly=temperature_2m,precipitation_probability,weather_code'
        + '&temperature_unit=celsius&timezone=auto&forecast_days=2';
      const res = await fetch(url);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      const h = data && data.hourly;
      if (!h || !Array.isArray(h.time) || !h.time.length) throw new Error('bad payload');

      const now = Date.now();
      let start = h.time.findIndex(t => new Date(t).getTime() >= now - 60 * 60 * 1000);
      if (start < 0) start = 0;

      const hours = [];
      for (let i = start; i < h.time.length && hours.length < 12; i++) {
        const d = new Date(h.time[i]);
        let hr = d.getHours();
        const ampm = hr >= 12 ? 'PM' : 'AM';
        let h12 = hr % 12; if (h12 === 0) h12 = 12;
        hours.push({
          label: h12 + ' ' + ampm,
          temp: (h.temperature_2m && h.temperature_2m[i] != null) ? h.temperature_2m[i] : null,
          pop: (h.precipitation_probability && h.precipitation_probability[i] != null) ? h.precipitation_probability[i] : null,
          icon: wxIcon(h.weather_code ? h.weather_code[i] : null),
        });
      }
      weatherState = { status: 'ok', hours };
    } catch (e) {
      weatherState = { status: 'error', hours: null };
    }
    renderWeather();
  }

  // ===================== tabs =====================
  function switchTab(tab) {
    activeTab = (tab === 'outfits') ? 'outfits' : 'items';
    $('wdItemsView').style.display = activeTab === 'items' ? '' : 'none';
    $('wdOutfitsView').style.display = activeTab === 'outfits' ? '' : 'none';
    $('wdTabItems').classList.toggle('active', activeTab === 'items');
    $('wdTabOutfits').classList.toggle('active', activeTab === 'outfits');
    $('wdTabItems').setAttribute('aria-selected', activeTab === 'items');
    $('wdTabOutfits').setAttribute('aria-selected', activeTab === 'outfits');
  }

  // ===================== render + boot =====================
  function render() {
    store = loadStore();
    outfits = loadOutfits();
    renderFilters();
    renderGrid();
    renderOutfitGrid();
  }

  function boot() {
    if (!storageReady()) $('wdWarn').classList.add('show');

    $('wdAddBtn').addEventListener('click', openAdd);
    $('wdModalClose').addEventListener('click', closeModal);
    $('wdModalBg').addEventListener('click', (e) => { if (e.target === $('wdModalBg')) closeModal(); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && $('wdModalBg').classList.contains('show')) closeModal(); });

    // photo slots
    [0, 1].forEach(i => {
      $('wdSlot' + i).addEventListener('click', (e) => {
        if (e.target.classList.contains('wd-slot-clear')) return; // handled below
        $('wdFile' + i).click();
      });
      $('wdFile' + i).addEventListener('change', (e) => {
        const f = e.target.files && e.target.files[0];
        onPickFile(i, f);
      });
    });
    document.querySelectorAll('.wd-slot-clear').forEach(btn => {
      btn.addEventListener('click', (e) => { e.stopPropagation(); clearSlot(parseInt(btn.dataset.slot, 10)); });
    });

    // category add-new
    $('wdNewCatBtn').addEventListener('click', () => {
      const w = $('wdNewCatWrap');
      if (w.classList.contains('show')) hideNewCat(); else showNewCat();
    });
    $('wdNewCatAdd').addEventListener('click', addCategory);
    $('wdNewCatInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); addCategory(); }
      else if (e.key === 'Escape') { e.preventDefault(); hideNewCat(); }
    });

    $('wdSave').addEventListener('click', submit);

    // tabs
    $('wdTabItems').addEventListener('click', () => switchTab('items'));
    $('wdTabOutfits').addEventListener('click', () => switchTab('outfits'));

    // outfit modal
    $('wdOutfitAddBtn').addEventListener('click', openOutfitAdd);
    $('wdOutfitModalClose').addEventListener('click', closeOutfitModal);
    $('wdOutfitModalBg').addEventListener('click', (e) => { if (e.target === $('wdOutfitModalBg')) closeOutfitModal(); });
    $('wdOutfitSave').addEventListener('click', submitOutfit);
    $('wdOutfitName').addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); submitOutfit(); } });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && $('wdOutfitModalBg').classList.contains('show')) closeOutfitModal();
    });

    render();
    initWeather();

    // ---------- cloud sync ----------
    if (window.initCloudSync) {
      window.initCloudSync({
        appKey: 'wardrobe',
        syncedKeys: [STORE_KEY, OUTFITS_KEY],
        onApplied: render,
      });
    }
    window.addEventListener('storage', (e) => { if (!e.key || e.key === STORE_KEY || e.key === OUTFITS_KEY) render(); });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', boot, { once: true });
  } else {
    boot();
  }
})();
</script>
</body>
</html>
